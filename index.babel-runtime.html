<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #FCFCFA;
    font-family: 'Plus Jakarta Sans', Pretendard, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  #root { display: block; }
  button { font-family: inherit; touch-action: manipulation; }
  #boot-error {
    position: fixed; inset: 0; z-index: 99999; display: none;
    padding: 24px; background: #fff; color: #111;
  }
</style>

<script>
  window.IMMM_APP_VERSION = '2026-05-16-rc2.4-babel';
  window.IMMM_BUILD_LABEL = 'rc2.4-rollback-babel-runtime';
  window.IMMM_RC_BASELINE = '1cfde96';
  window.IMMM_RUNTIME = 'babel';
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<script type="module">
  try {
    const { FaceLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm');
    window.MediaPipeFaceLandmarker = FaceLandmarker;
    window.MediaPipeFilesetResolver = FilesetResolver;
    window.dispatchEvent(new Event('mediapipe-ready'));
  } catch (e) {}
</script>
